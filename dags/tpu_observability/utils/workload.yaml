apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: test-workload
  annotations:
    alpha.jobset.sigs.k8s.io/exclusive-topology: cloud.google.com/gke-nodepool
  namespace: default
spec:
  failurePolicy:
    maxRestarts: 4
  replicatedJobs:
    - name: slice
      replicas: 1
      template:
        spec:
          parallelism: 4
          completions: 4
          backoffLimit: 3
          template:
            spec:
              hostNetwork: true
              dnsPolicy: ClusterFirstWithHostNet
              nodeSelector:
                cloud.google.com/gke-tpu-accelerator: tpu-v6e-slice
                cloud.google.com/gke-tpu-topology: 4x4
              containers:
              - name: jax-tpu
                image: python:3.10
                ports:
                - containerPort: 8471
                - containerPort: 8080
                - containerPort: 8431
                securityContext:
                  privileged: true
                command:
                - bash
                - -c
                - |
                  pip install "jax[tpu]" -f https://storage.googleapis.com/jax-releases/libtpu_releases.html
                  python -c '
                  import jax
                  import jax.numpy as jnp
                  import time
                  import os
                  from jax.sharding import Mesh, NamedSharding
                  from jax.experimental.pjit import pjit
              
                  # ========= 分布式初始化 =========
                  os.environ.setdefault("JAX_USE_PJIT", "true")
                  jax.distributed.initialize()
              
                  # ========= 設定設備與 mesh =========
                  global_devices = jax.devices()
                  print(f"[Host {jax.process_index()}] Got {len(global_devices)} global devices")
                  mesh = Mesh(global_devices, ("x",))
              
                  # ========= 建立更大的資料 =========
                  # 32768 x 32768 matrix: 每個 matrix 約 4 GB, 共兩個 = 8 GB input
                  # 內部 matmul 的中間結果也會產生數個 ~4~8 GB matrix
                  # 所以總 memory 使用預估會 >20 GB / chip
                  size = 32768  
                  x_global = jnp.ones((size, size), dtype=jnp.float32)
                  y_global = jnp.ones((size, size), dtype=jnp.float32)
              
                  sharding = NamedSharding(mesh, jax.sharding.PartitionSpec("x", None))
                  x = jax.device_put(x_global, sharding)
                  y = jax.device_put(y_global, sharding)
              
                  # ========= 定義更重的 workload =========
                  @pjit
                  def matmul_ultra_heavy(x, y):
                      # 疊加更多 matmul → 加重計算與記憶體壓力
                      tmp1 = jnp.dot(x, y)
                      tmp2 = jnp.dot(tmp1, y.T)
                      tmp3 = jnp.dot(tmp2, x.T)
                      tmp4 = jnp.dot(tmp3, x)
                      tmp5 = jnp.dot(tmp4, y)
                      return tmp5
              
                  # ========= 預熱 =========
                  print(f"[Host {jax.process_index()}] Warming up...")
                  matmul_ultra_heavy(x, y).block_until_ready()
              
                  # ========= Benchmark =========
                  print(f"[Host {jax.process_index()}] Starting benchmark...")
              
                  start = time.time()
                  # 循環次數 x10，疊加深度也更多
                  for i in range(1_000_000_000): # Remember to control loop time to control experiment time
                      result = matmul_ultra_heavy(x, y)
                  result.block_until_ready()
                  end = time.time()
              
                  if jax.process_index() == 0:
                      print(f"Total time: {end - start:.2f} seconds (on full v6e-16)")
                  '
                resources:
                  requests:
                   google.com/tpu: 4
                  limits:
                   google.com/tpu: 4
